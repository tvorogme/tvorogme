      <tspan x="0" y="18">    .--.        .-.          .--.        .-.          .--.        .-.</tspan>
      <tspan x="0" y="36"> .-(    )-.  .-(   )-.   .-(    )-.  .-(   )-.   .-(    )-.  .-(   )-.</tspan>
      <tspan x="0" y="58">      /\          /\            /\          /\            /\          /\</tspan>
      <tspan x="0" y="76">     /  \   /\   /  \    /\    /  \   /\   /  \    /\    /  \   /\   /  \</tspan>
