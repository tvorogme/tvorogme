<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 260" role="img" aria-labelledby="title desc">
  <title id="title">Before Agent Era looping ASCII scene</title>
  <desc id="desc">Looping ASCII scene with a person walking along an endless road past flowers and trees.</desc>
  <style>
    @keyframes beforeBack {
      from { transform: translateX(0); }
      to { transform: translateX(-520px); }
    }
    @keyframes beforeGround {
      from { transform: translateX(0); }
      to { transform: translateX(-520px); }
    }
    @keyframes beforeRoad {
      from { transform: translateX(0); }
      to { transform: translateX(-520px); }
    }
    @keyframes beforeBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes beforeStepA {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes beforeStepB {
      0%, 49% { opacity: 0; }
      50%, 100% { opacity: 1; }
    }
    .beforeBackLoop { animation: beforeBack 13s linear infinite; }
    .beforeGroundLoop { animation: beforeGround 5.8s linear infinite; }
    .beforeRoadLoop { animation: beforeRoad 3.2s linear infinite; }
    .beforeWalkerA {
      animation:
        beforeBob 0.72s ease-in-out infinite,
        beforeStepA 0.72s steps(1, end) infinite;
    }
    .beforeWalkerB {
      animation:
        beforeBob 0.72s ease-in-out infinite,
        beforeStepB 0.72s steps(1, end) infinite;
    }
    @media (prefers-reduced-motion: reduce) {
      .beforeBackLoop,
      .beforeGroundLoop,
      .beforeRoadLoop,
      .beforeWalkerA,
      .beforeWalkerB { animation: none; }
      .beforeWalkerB { opacity: 0; }
    }
  </style>
